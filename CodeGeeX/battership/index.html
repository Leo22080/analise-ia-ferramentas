<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha Naval - Homem vs Máquina</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Batalha Naval</h1>
        <div id="status">Clique no botão abaixo para começar!</div>
        
        <!-- Botão de Inicialização -->
        <button id="start-btn" onclick="startGame()">Iniciar Jogo</button>

        <div class="boards-container">
            <!-- Tabuleiro do Jogador -->
            <div class="board-wrapper">
                <h2>Jogador</h2>
                <div id="player-board" class="board"></div>
            </div>

            <!-- Tabuleiro da IA (Inimigo) -->
            <div class="board-wrapper">
                <h2>Inimigo (IA)</h2>
                <div id="enemy-board" class="board"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
