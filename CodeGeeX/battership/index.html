<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Battleship</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>⚓ Batalha Naval ⚓</h1>

    <!-- Container principal -->
    <div id="game-container">

        <!-- Tabuleiro do jogador -->
        <div>
            <h2>Seu Tabuleiro</h2>
            <div id="player-board" class="board"></div>
        </div>

        <!-- Tabuleiro do inimigo -->
        <div>
            <h2>Inimigo</h2>
            <div id="enemy-board" class="board"></div>
        </div>

    </div>

    <!-- Mensagens do jogo -->
    <div id="status"></div>

    <script src="script.js"></script>
</body>
</html>
